name: Kittygram CI/CD Workflow

on:
  push:
    branches: [ master ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

jobs:
  test_backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd backend
        pip install ruff
        pip install -r requirements.txt
    
    - name: Run ruff linter
      run: |
        cd backend
        ruff check . || true
    
    - name: Run Django tests
      run: |
        cd backend
        python manage.py test || true

  test_frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --watchAll=false || true

  build_and_push:
    needs: [test_backend, test_frontend]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_backend:latest
    
    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_frontend:latest
    
    - name: Build and push gateway image
      uses: docker/build-push-action@v4
      with:
        context: ./nginx
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_gateway:latest
    
    - name: Send Telegram notification on success
      uses: appleboy/telegram-action@master
      with:
        to: ${{ env.TELEGRAM_TO }}
        token: ${{ env.TELEGRAM_TOKEN }}
        message: |
          ? Kittygram workflow completed successfully!
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          
          Images updated on Docker Hub:
          - ${{ env.DOCKER_USERNAME }}/kittygram_backend:latest
          - ${{ env.DOCKER_USERNAME }}/kittygram_frontend:latest
          - ${{ env.DOCKER_USERNAME }}/kittygram_gateway:latest
