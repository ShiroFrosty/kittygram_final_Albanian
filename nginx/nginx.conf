server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
    }

    location /static/ {
        proxy_pass http://frontend:80/static/;
        proxy_set_header Host $host;
    }

    location /media/ {
        alias /media/;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
