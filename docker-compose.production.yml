version: '3'

volumes:
  pg_data_production:
  static_volume:
  media_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    restart: always

  backend:
    image: shirofrosty/kittygram_backend:latest
    env_file: .env
    volumes:
      - static_volume:/static
      - media_volume:/media
    restart: always
    depends_on:
      - db

  frontend:
    image: shirofrosty/kittygram_frontend:latest
    restart: always

  gateway:
    image: shirofrosty/kittygram_gateway:latest
    ports:
      - "80:80"
    volumes:
      - static_volume:/static
      - media_volume:/media
    restart: always
    depends_on:
      - backend
      - frontend